- name: Create JLBCredit Forest
  hosts: dc1
  tasks:
    - name: Install AD DS
      win_feature:
        name: AD-Domain-Services
        state: present

    - name: Promote DC
      win_domain:
        dns_domain_name: JLBCREDIT.local
        safe_mode_password: Password123!
        
- name: Join DC2
  hosts: dc2
  tasks:
    - name: Join domain
      win_domain_membership:
        dns_domain_name: JLBCREDIT.local
        domain_admin_user: Administrator
        domain_admin_password: Password123!

- name: Create Consultio Forest
  hosts: dc3
  tasks:
    - name: Promote new forest
      win_domain:
        dns_domain_name: CONSULTIO.local
        safe_mode_password: Password123!

- name: Create trust
  hosts: dc1
  tasks:
    - name: Trust
      win_shell: |
        netdom trust CONSULTIO.local /Domain:JLBCREDIT.local /add /forest

- name: Create user
  hosts: dc1
  tasks:
    - name: Add user
      win_domain_user:
        name: mcorrigan
        password: Password123!
        given_name: Mark
        surname: Corrigan
        state: present

- name: Join client
  hosts: client
  tasks:
    - name: Join domain
      win_domain_membership:
        dns_domain_name: JLBCREDIT.local
        domain_admin_user: Administrator
        domain_admin_password: Password123!
        state: domain

    - name: Reboot
      win_reboot: