# roles/dc_child/tasks/main.yml
- name: Install AD DS
  ansible.windows.win_feature:
    name: AD-Domain-Services
    include_management_tools: true
    state: present

- name: Create child domain
  microsoft.ad.domain:
    dns_domain_name: "{{ child_domain }}.{{ domain_name }}"
    domain_type: child
    parent_domain_name: "{{ domain_name }}"
    safe_mode_password: "{{ safe_mode_password }}"
  register: child_domain

- name: Reboot
  ansible.windows.win_reboot:
  when: child_domain.reboot_required | default(false)